<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%tweettube-mark.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TweetTube</title>
    <script>
      (function () {
        const redirect = sessionStorage.getItem('tweettube_redirect');
        if (redirect) {
          sessionStorage.removeItem('tweettube_redirect');
          history.replaceState(null, '', redirect);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/frontend/src/main.jsx"></script>
  </body>
</html>
