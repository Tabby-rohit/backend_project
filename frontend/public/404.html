<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>TweetTube</title>
    <script>
      (function () {
        const { pathname, search, hash } = window.location;
        const redirectTarget = pathname + search + hash;
        sessionStorage.setItem('tweettube_redirect', redirectTarget);
        const segments = pathname.split('/').filter(Boolean);
        const repoBase = segments.length > 0 ? '/' + segments[0] + '/' : '/';
        window.location.replace(repoBase);
      })();
    </script>
  </head>
  <body></body>
</html>
